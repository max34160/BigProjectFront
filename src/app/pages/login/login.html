
      
<form class="login-form">
  <mat-form-field class="login-full-width">
    <mat-label>Nom</mat-label>
    <input type = "text" matInput placeholder="Nom" [(ngModel)]="nom" name="nom" required>
 </mat-form-field>
</form>

  </mat-form-field>
</form>
<form class="login-form">
